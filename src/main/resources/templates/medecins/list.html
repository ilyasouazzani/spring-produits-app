<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/template}"
      lang="fr">
<head><title>Médecins</title></head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1"><i class="bi bi-hospital text-info me-2"></i>Gestion des Médecins</h2>
            <p class="text-muted mb-0" th:text="'Total: ' + ${totalItems} + ' médecin(s)'"></p>
        </div>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/formMedecin}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Nouveau Médecin
        </a>
    </div>

    <div class="card">
        <div class="card-header">
            <form th:action="@{/medecins}" method="get" class="d-flex gap-2">
                <div class="input-group" style="max-width:350px">
                    <span class="input-group-text bg-white border-end-0">
                        <i class="bi bi-search text-muted"></i>
                    </span>
                    <input type="text" name="keyword" th:value="${keyword}"
                           class="form-control border-start-0 ps-0"
                           placeholder="Rechercher un médecin...">
                </div>
                <button class="btn btn-outline-primary"><i class="bi bi-search me-1"></i>Rechercher</button>
                <a th:href="@{/medecins}" class="btn btn-outline-secondary"><i class="bi bi-x-circle me-1"></i>Reset</a>
            </form>
        </div>

        <div class="card-body">
            <div class="row g-3" th:if="${!#lists.isEmpty(medecins)}">
                <div class="col-md-6 col-lg-4" th:each="medecin : ${medecins}">
                    <div class="card h-100 border">
                        <div class="card-body">
                            <div class="d-flex align-items-center gap-3 mb-3">
                                <div class="bg-info bg-opacity-10 text-info rounded-circle d-flex align-items-center justify-content-center"
                                     style="width:48px;height:48px;font-size:1.4rem">
                                    <i class="bi bi-person-badge"></i>
                                </div>
                                <div>
                                    <div class="fw-bold" th:text="${medecin.nom}"></div>
                                    <span class="badge bg-info bg-opacity-10 text-info small"
                                          th:text="${medecin.specialite}"></span>
                                </div>
                            </div>
                            <div class="text-muted small">
                                <i class="bi bi-envelope me-1"></i>
                                <span th:text="${medecin.email}"></span>
                            </div>
                        </div>
                        <div class="card-footer bg-white border-top-0 pt-0" sec:authorize="hasRole('ADMIN')">
                            <div class="d-flex gap-2">
                                <a th:href="@{/editMedecin/{id}(id=${medecin.id})}"
                                   class="btn btn-sm btn-outline-primary flex-fill">
                                    <i class="bi bi-pencil me-1"></i>Modifier
                                </a>
                                <a th:href="@{/deleteMedecin/{id}(id=${medecin.id}, keyword=${keyword}, page=${currentPage})}"
                                   class="btn btn-sm btn-outline-danger flex-fill"
                                   onclick="return confirm('Supprimer ce médecin?')">
                                    <i class="bi bi-trash me-1"></i>Supprimer
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(medecins)}" class="text-center py-5 text-muted">
                <i class="bi bi-inbox fs-1 d-block mb-2"></i>Aucun médecin trouvé
            </div>
        </div>

        <div class="card-footer bg-white d-flex justify-content-center py-3" th:if="${pages.length > 1}">
            <ul class="pagination mb-0">
                <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/medecins(page=${currentPage - 1}, keyword=${keyword})}">
                        <i class="bi bi-chevron-left"></i></a>
                </li>
                <li class="page-item" th:each="page, i : ${pages}"
                    th:classappend="${currentPage == i.index ? 'active' : ''}">
                    <a class="page-link" th:href="@{/medecins(page=${i.index}, keyword=${keyword})}"
                       th:text="${i.index + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage == pages.length - 1 ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/medecins(page=${currentPage + 1}, keyword=${keyword})}">
                        <i class="bi bi-chevron-right"></i></a>
                </li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>

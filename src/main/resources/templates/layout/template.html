<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title layout:title-pattern="$CONTENT_TITLE | Spring App">Spring App</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --sidebar-width: 240px;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
        }

        body { background-color: #f0f4f8; font-family: 'Segoe UI', system-ui, sans-serif; }

        /* Navbar */
        .navbar { background: linear-gradient(135deg, #1e293b, #334155) !important; box-shadow: 0 2px 10px rgba(0,0,0,.3); }
        .navbar-brand { font-weight: 700; font-size: 1.25rem; letter-spacing: .5px; }
        .navbar .nav-link { color: #cbd5e1 !important; transition: color .2s; }
        .navbar .nav-link:hover { color: #fff !important; }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            min-height: calc(100vh - 56px);
            background: #1e293b;
            position: fixed;
            top: 56px;
            left: 0;
            z-index: 100;
            padding-top: 1rem;
            box-shadow: 2px 0 10px rgba(0,0,0,.15);
        }
        .sidebar .nav-link {
            color: #94a3b8;
            padding: .65rem 1.25rem;
            border-radius: 0;
            font-size: .9rem;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: .6rem;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            color: #fff;
            background: rgba(37, 99, 235, .3);
            border-left: 3px solid var(--primary);
            padding-left: calc(1.25rem - 3px);
        }
        .sidebar .nav-link i { font-size: 1.1rem; }
        .sidebar-heading {
            font-size: .7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #475569;
            padding: 1rem 1.25rem .4rem;
            font-weight: 700;
        }

        /* Main content */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 2rem;
            min-height: calc(100vh - 56px);
        }

        /* Cards */
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.05);
            transition: box-shadow .2s;
        }
        .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.12); }
        .card-header {
            background: white;
            border-bottom: 2px solid #f1f5f9;
            border-radius: 12px 12px 0 0 !important;
            font-weight: 600;
            padding: 1rem 1.5rem;
        }
        .card-body { padding: 1.5rem; }

        /* Tables */
        .table { margin-bottom: 0; }
        .table th {
            background: #f8fafc;
            font-weight: 600;
            font-size: .85rem;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: #64748b;
            border-bottom: 2px solid #e2e8f0;
        }
        .table td { vertical-align: middle; border-color: #f1f5f9; }
        .table-hover tbody tr:hover { background: #f8fafc; }

        /* Badges */
        .badge { font-weight: 500; padding: .4em .75em; border-radius: 6px; }

        /* Buttons */
        .btn { border-radius: 8px; font-weight: 500; }
        .btn-primary { background: var(--primary); border-color: var(--primary); }
        .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }

        /* Forms */
        .form-control, .form-select {
            border-radius: 8px;
            border: 1.5px solid #e2e8f0;
            padding: .5rem .9rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,.15);
        }

        /* Alert */
        .alert { border: none; border-radius: 10px; }

        /* Stat card */
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 1px 3px rgba(0,0,0,.07);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .stat-icon {
            width: 56px; height: 56px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
        }

        /* Pagination */
        .pagination .page-link { border-radius: 8px !important; margin: 0 2px; border: 1.5px solid #e2e8f0; }
        .pagination .page-item.active .page-link { background: var(--primary); border-color: var(--primary); }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; padding: 1rem; }
        }
    </style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-layers-fill me-2"></i>Spring App
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTop">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarTop">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#" data-bs-toggle="dropdown">
                        <div class="bg-primary rounded-circle d-flex align-items-center justify-content-center"
                             style="width:32px;height:32px;font-size:.8rem;font-weight:700;">
                            <span sec:authentication="name" class="text-white">U</span>
                        </div>
                        <span sec:authentication="name">Utilisateur</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0" style="border-radius:10px">
                        <li>
                            <div class="px-3 py-2 text-muted small">
                                <div class="fw-600">Connecté en tant que</div>
                                <div class="fw-bold" sec:authentication="name"></div>
                            </div>
                        </li>
                        <li><hr class="dropdown-divider my-1"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right me-2"></i>Déconnexion
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar" style="top:56px">
    <div class="sidebar-heading">Principal</div>
    <a class="nav-link" th:href="@{/products}"
       th:classappend="${#httpServletRequest.requestURI.contains('/product') ? 'active' : ''}">
        <i class="bi bi-box-seam"></i> Produits
    </a>
    <a class="nav-link" th:href="@{/patients}"
       th:classappend="${#httpServletRequest.requestURI.contains('/patient') ? 'active' : ''}">
        <i class="bi bi-heart-pulse"></i> Patients
    </a>
    <a class="nav-link" th:href="@{/medecins}"
       th:classappend="${#httpServletRequest.requestURI.contains('/medecin') ? 'active' : ''}">
        <i class="bi bi-hospital"></i> Médecins
    </a>

    <div class="sidebar-heading" sec:authorize="hasRole('ADMIN')">Administration</div>
    <a sec:authorize="hasRole('ADMIN')" class="nav-link" th:href="@{/admin/users}"
       th:classappend="${#httpServletRequest.requestURI.contains('/admin') ? 'active' : ''}">
        <i class="bi bi-people"></i> Utilisateurs
    </a>
    <a sec:authorize="hasRole('ADMIN')" class="nav-link" th:href="@{/h2-console}" target="_blank">
        <i class="bi bi-database"></i> H2 Console
    </a>
</div>

<!-- ===== MAIN CONTENT ===== -->
<div class="main-content" style="margin-top:56px">

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Page content -->
    <div layout:fragment="content">
        <!-- Content injected here -->
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Auto dismiss alerts after 5 seconds
    setTimeout(() => {
        document.querySelectorAll('.alert').forEach(a => {
            const bsAlert = bootstrap.Alert.getOrCreateInstance(a);
            bsAlert.close();
        });
    }, 5000);
</script>
</body>
</html>

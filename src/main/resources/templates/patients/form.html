<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/template}"
      lang="fr">
<head>
    <title th:text="${mode == 'edit'} ? 'Modifier Patient' : 'Nouveau Patient'">Patient</title>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/patients}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
        <h2 class="fw-bold mb-0">
            <i class="bi bi-heart-pulse text-danger me-2"></i>
            <span th:text="${mode == 'edit'} ? 'Modifier le Patient' : 'Nouveau Patient'"></span>
        </h2>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card">
                <div class="card-header">
                    <i class="bi bi-pencil-square me-2 text-danger"></i>Formulaire Patient
                </div>
                <div class="card-body">
                    <form th:action="@{/savePatient}" method="post" th:object="${patient}">
                        <input type="hidden" th:field="*{id}">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Nom <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{nom}"
                                       th:classappend="${#fields.hasErrors('nom')} ? 'is-invalid'"
                                       placeholder="Nom de famille">
                                <div class="invalid-feedback" th:errors="*{nom}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Prénom <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{prenom}"
                                       th:classappend="${#fields.hasErrors('prenom')} ? 'is-invalid'"
                                       placeholder="Prénom">
                                <div class="invalid-feedback" th:errors="*{prenom}"></div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Date de Naissance <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" th:field="*{dateNaissance}"
                                       th:classappend="${#fields.hasErrors('dateNaissance')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{dateNaissance}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" class="form-control" th:field="*{email}"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                       placeholder="patient@email.com">
                                <div class="invalid-feedback" th:errors="*{email}"></div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Score (0-100)</label>
                                <input type="number" class="form-control" min="0" max="100"
                                       th:field="*{score}"
                                       th:classappend="${#fields.hasErrors('score')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{score}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold d-block">Statut de santé</label>
                                <div class="form-check form-switch mt-2">
                                    <input class="form-check-input" type="checkbox"
                                           th:field="*{malade}" id="maladeCheck" role="switch">
                                    <label class="form-check-label" for="maladeCheck">Patient malade</label>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save me-1"></i>
                                <span th:text="${mode == 'edit'} ? 'Mettre à jour' : 'Enregistrer'"></span>
                            </button>
                            <a th:href="@{/patients}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-1"></i>Annuler
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

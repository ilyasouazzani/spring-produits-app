<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/template}"
      lang="fr">
<head><title>Patients</title></head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1"><i class="bi bi-heart-pulse text-danger me-2"></i>Gestion des Patients</h2>
            <p class="text-muted mb-0" th:text="'Total: ' + ${totalItems} + ' patient(s)'"></p>
        </div>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/formPatient}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Nouveau Patient
        </a>
    </div>

    <div class="card">
        <div class="card-header">
            <form th:action="@{/patients}" method="get" class="d-flex gap-2 align-items-center">
                <div class="input-group" style="max-width:400px">
                    <span class="input-group-text bg-white border-end-0">
                        <i class="bi bi-search text-muted"></i>
                    </span>
                    <input type="text" name="keyword" th:value="${keyword}"
                           class="form-control border-start-0 ps-0"
                           placeholder="Rechercher un patient...">
                </div>
                <button type="submit" class="btn btn-outline-primary">
                    <i class="bi bi-search me-1"></i>Rechercher
                </button>
                <a th:href="@{/patients}" class="btn btn-outline-secondary">
                    <i class="bi bi-x-circle me-1"></i>Réinitialiser
                </a>
            </form>
        </div>

        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Nom</th>
                        <th>Prénom</th>
                        <th>Date Naissance</th>
                        <th>Email</th>
                        <th>Score</th>
                        <th>Statut</th>
                        <th sec:authorize="hasRole('ADMIN')">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(patients)}">
                        <td colspan="8" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox fs-1 d-block mb-2"></i>Aucun patient trouvé
                        </td>
                    </tr>
                    <tr th:each="patient : ${patients}">
                        <td class="text-muted small" th:text="${patient.id}"></td>
                        <td class="fw-semibold" th:text="${patient.nom}"></td>
                        <td th:text="${patient.prenom}"></td>
                        <td th:text="${patient.dateNaissance != null ? #dates.format(patient.dateNaissance, 'dd/MM/yyyy') : '-'}"></td>
                        <td class="text-muted small" th:text="${patient.email ?: '-'}"></td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="progress flex-grow-1" style="height:6px;min-width:60px">
                                    <div class="progress-bar"
                                         th:classappend="${patient.score >= 70 ? 'bg-success' : (patient.score >= 40 ? 'bg-warning' : 'bg-danger')}"
                                         th:style="'width:' + ${patient.score} + '%'"></div>
                                </div>
                                <span class="small fw-bold" th:text="${patient.score}"></span>
                            </div>
                        </td>
                        <td>
                            <span th:class="${patient.malade ? 'badge bg-danger' : 'badge bg-success'}"
                                  th:text="${patient.malade ? 'Malade' : 'En bonne santé'}"></span>
                        </td>
                        <td sec:authorize="hasRole('ADMIN')">
                            <div class="d-flex gap-1">
                                <a th:href="@{/editPatient/{id}(id=${patient.id})}"
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/deletePatient/{id}(id=${patient.id}, keyword=${keyword}, page=${currentPage})}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Supprimer ce patient?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-footer bg-white d-flex justify-content-center py-3" th:if="${pages.length > 1}">
            <ul class="pagination mb-0">
                <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/patients(page=${currentPage - 1}, keyword=${keyword})}">
                        <i class="bi bi-chevron-left"></i></a>
                </li>
                <li class="page-item" th:each="page, i : ${pages}"
                    th:classappend="${currentPage == i.index ? 'active' : ''}">
                    <a class="page-link" th:href="@{/patients(page=${i.index}, keyword=${keyword})}"
                       th:text="${i.index + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage == pages.length - 1 ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/patients(page=${currentPage + 1}, keyword=${keyword})}">
                        <i class="bi bi-chevron-right"></i></a>
                </li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/template}"
      lang="fr">
<head><title>Accès Refusé</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex align-items-center justify-content-center" style="min-height: 60vh">
        <div class="text-center">
            <div class="text-danger mb-3" style="font-size: 5rem">
                <i class="bi bi-shield-x"></i>
            </div>
            <h1 class="fw-bold text-danger mb-2">Accès Refusé</h1>
            <p class="text-muted lead mb-4">
                Vous n'avez pas les permissions nécessaires pour accéder à cette page.<br>
                Contactez votre administrateur si vous pensez qu'il s'agit d'une erreur.
            </p>
            <a th:href="@{/}" class="btn btn-primary btn-lg">
                <i class="bi bi-house me-2"></i>Retour à l'accueil
            </a>
        </div>
    </div>
</div>
</body>
</html>

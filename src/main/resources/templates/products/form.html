<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/template}"
      lang="fr">
<head>
    <title th:text="${mode == 'edit'} ? 'Modifier Produit' : 'Nouveau Produit'">Produit</title>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/products}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i>
        </a>
        <div>
            <h2 class="fw-bold mb-0">
                <i class="bi bi-box-seam text-primary me-2"></i>
                <span th:text="${mode == 'edit'} ? 'Modifier le Produit' : 'Nouveau Produit'"></span>
            </h2>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card">
                <div class="card-header">
                    <i class="bi bi-pencil-square me-2 text-primary"></i>
                    <span th:text="${mode == 'edit'} ? 'Formulaire de modification' : 'Formulaire de saisie'"></span>
                </div>
                <div class="card-body">
                    <form th:action="@{/saveProduct}" method="post" th:object="${product}">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-tag me-1"></i>Nom du produit <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control"
                                   th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                   placeholder="ex: Laptop Dell XPS">
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-currency-dollar me-1"></i>Prix (MAD) <span class="text-danger">*</span>
                                </label>
                                <input type="number" step="0.01" min="0" class="form-control"
                                       th:field="*{price}"
                                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                                       placeholder="0.00">
                                <div class="invalid-feedback" th:errors="*{price}"></div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-boxes me-1"></i>Quantité <span class="text-danger">*</span>
                                </label>
                                <input type="number" min="0" class="form-control"
                                       th:field="*{quantity}"
                                       th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'"
                                       placeholder="0">
                                <div class="invalid-feedback" th:errors="*{quantity}"></div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-card-text me-1"></i>Description
                            </label>
                            <textarea class="form-control" rows="3"
                                      th:field="*{description}"
                                      th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                                      placeholder="Description du produit..."></textarea>
                            <div class="invalid-feedback" th:errors="*{description}"></div>
                            <div class="form-text">Maximum 500 caractères</div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save me-1"></i>
                                <span th:text="${mode == 'edit'} ? 'Mettre à jour' : 'Enregistrer'"></span>
                            </button>
                            <a th:href="@{/products}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-1"></i>Annuler
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
